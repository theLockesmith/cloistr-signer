{{define "content"}}
<div class="auth-container">
    <h1>Login</h1>

    <div id="error-message" class="alert alert-error" style="display: none;"></div>

    <div class="auth-options">
        <button id="nip07-login" class="btn btn-primary btn-block" style="display: none;">
            Login with Nostr Extension
        </button>
        <div id="nip07-status" class="text-muted" style="display: none;">
            Checking for NIP-07 extension...
        </div>
    </div>

    <div class="divider">
        <span>or login with password</span>
    </div>

    <form id="login-form" class="auth-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div class="password-input-wrapper">
                <input type="password" id="password" name="password" required autocomplete="current-password">
                <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                    <svg class="eye-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path class="eye-open" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="currentColor"/>
                        <path class="eye-closed" d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" fill="currentColor" style="display:none"/>
                    </svg>
                </button>
            </div>
        </div>

        <div id="mfa-group" class="form-group" style="display: none;">
            <label for="mfa_code">MFA Code</label>
            <input type="text" id="mfa_code" name="mfa_code" placeholder="6-digit code" autocomplete="one-time-code">
        </div>

        <div class="form-group remember-group">
            <label class="checkbox-label">
                <input type="checkbox" id="remember" name="remember">
                <span>Remember this device for 30 days</span>
            </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>

    <p class="auth-footer">
        Don't have an account? <a href="/register">Register</a>
    </p>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('login-form');
    const errorDiv = document.getElementById('error-message');
    const mfaGroup = document.getElementById('mfa-group');
    const nip07Button = document.getElementById('nip07-login');
    const nip07Status = document.getElementById('nip07-status');

    // Check for NIP-07 extension
    setTimeout(function() {
        if (window.nostr) {
            nip07Button.style.display = 'block';
            nip07Status.style.display = 'none';
        } else {
            nip07Status.textContent = 'No Nostr extension found';
            nip07Status.style.display = 'block';
        }
    }, 500);

    // NIP-07 login
    nip07Button.addEventListener('click', async function() {
        try {
            ButtonState.setLoading(nip07Button, 'Signing...');

            const pubkey = await window.nostr.getPublicKey();
            const challenge = 'cloistr-login-' + Date.now();
            const remember = document.getElementById('remember').checked;

            // Create a kind:1 event as challenge
            const event = {
                kind: 1,
                created_at: Math.floor(Date.now() / 1000),
                tags: [],
                content: challenge,
                pubkey: pubkey
            };

            const signedEvent = await window.nostr.signEvent(event);

            const response = await fetch('/web/api/login/nip07', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    pubkey: pubkey,
                    signature: signedEvent.sig,
                    challenge: challenge,
                    remember: remember
                })
            });

            const data = await response.json();
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                showError(data.error || 'Login failed');
                ButtonState.reset(nip07Button);
            }
        } catch (err) {
            showError(err.message || 'NIP-07 login failed');
            ButtonState.reset(nip07Button);
        }
    });

    // Password login
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const submitBtn = form.querySelector('button[type="submit"]');
        ButtonState.setLoading(submitBtn, 'Logging in...');

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const mfaCode = document.getElementById('mfa_code').value;
        const remember = document.getElementById('remember').checked;

        try {
            const response = await fetch('/web/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: username,
                    password: password,
                    mfa_code: mfaCode,
                    remember: remember
                })
            });

            const data = await response.json();

            if (data.mfa_required) {
                mfaGroup.style.display = 'block';
                document.getElementById('mfa_code').focus();
                ButtonState.reset(submitBtn);
                return;
            }

            if (data.success) {
                window.location.href = data.redirect;
            } else {
                showError(data.error || 'Login failed');
                ButtonState.reset(submitBtn);
            }
        } catch (err) {
            showError('Login failed');
            ButtonState.reset(submitBtn);
        }
    });

    function showError(message) {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
    }

    // Password visibility toggle
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.querySelector('.password-toggle');
    const eyeOpen = toggleBtn.querySelector('.eye-open');
    const eyeClosed = toggleBtn.querySelector('.eye-closed');

    toggleBtn.addEventListener('click', function() {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeOpen.style.display = 'none';
            eyeClosed.style.display = 'block';
        } else {
            passwordInput.type = 'password';
            eyeOpen.style.display = 'block';
            eyeClosed.style.display = 'none';
        }
    });
});
</script>
<style>
.password-input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
}
.password-input-wrapper input {
    flex: 1;
    padding-right: 40px;
}
.password-toggle {
    position: absolute;
    right: 8px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
}
.password-toggle:hover {
    color: var(--text-primary);
}
.remember-group {
    margin-bottom: 1rem;
}
.checkbox-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--text-secondary);
}
.checkbox-label input[type="checkbox"] {
    width: auto;
    margin: 0;
    cursor: pointer;
}
</style>
{{end}}

{{template "base" .}}
