{{define "content"}}
<div class="page-header">
    <h1>Signing Keys</h1>
    <button id="create-key-btn" class="btn btn-primary">Create Key</button>
</div>

<div id="message" class="alert" style="display: none;"></div>

<div class="table-container">
    <table class="data-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Public Key</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {{range .Keys}}
            <tr data-id="{{.ID}}">
                <td>{{.Name}}</td>
                <td class="pubkey">{{truncate .Pubkey 24}}...</td>
                <td>{{formatTime .CreatedAt}}</td>
                <td>
                    <button class="btn btn-sm copy-btn" data-pubkey="{{.Pubkey}}">Copy Pubkey</button>
                    <button class="btn btn-sm btn-danger delete-btn" data-id="{{.ID}}" data-name="{{.Name}}">Delete</button>
                </td>
            </tr>
            {{else}}
            <tr>
                <td colspan="4" class="text-center text-muted">No keys created yet</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>

<!-- Create Key Modal -->
<div id="create-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <h2>Create New Key</h2>
        <form id="create-form">
            <div class="form-group">
                <label for="key-name">Key Name</label>
                <input type="text" id="key-name" name="name" required placeholder="e.g., Main Key">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="cancel-create">Cancel</button>
                <button type="submit" class="btn btn-primary">Create</button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const createBtn = document.getElementById('create-key-btn');
    const modal = document.getElementById('create-modal');
    const cancelBtn = document.getElementById('cancel-create');
    const createForm = document.getElementById('create-form');
    const messageDiv = document.getElementById('message');

    createBtn.addEventListener('click', () => modal.style.display = 'flex');
    cancelBtn.addEventListener('click', () => modal.style.display = 'none');

    modal.addEventListener('click', function(e) {
        if (e.target === modal) modal.style.display = 'none';
    });

    createForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const name = document.getElementById('key-name').value;

        try {
            const response = await fetch('/api/v1/keys', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name})
            });

            if (response.ok) {
                showMessage('Key created successfully', 'success');
                setTimeout(() => location.reload(), 1000);
            } else {
                const data = await response.json();
                showMessage(data.error || 'Failed to create key', 'error');
            }
        } catch (err) {
            showMessage('Failed to create key', 'error');
        }
        modal.style.display = 'none';
    });

    // Copy buttons
    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            navigator.clipboard.writeText(this.dataset.pubkey);
            this.textContent = 'Copied!';
            setTimeout(() => this.textContent = 'Copy Pubkey', 1500);
        });
    });

    // Delete buttons
    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async function() {
            const id = this.dataset.id;
            const name = this.dataset.name;

            if (!confirm(`Delete key "${name}"? This cannot be undone.`)) return;

            try {
                const response = await fetch(`/api/v1/keys/${id}`, {method: 'DELETE'});
                if (response.ok) {
                    this.closest('tr').remove();
                    showMessage('Key deleted', 'success');
                } else {
                    showMessage('Failed to delete key', 'error');
                }
            } catch (err) {
                showMessage('Failed to delete key', 'error');
            }
        });
    });

    function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = 'alert alert-' + type;
        messageDiv.style.display = 'block';
        setTimeout(() => messageDiv.style.display = 'none', 3000);
    }
});
</script>
{{end}}

{{template "base" .}}
