{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <meta name="theme-color" content="#8B5CF6">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {{if .User}}
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <img src="/static/logo.svg" alt="Cloistr" class="nav-logo">
            <span>Cloistr</span>
        </a>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/keys">Keys</a>
            <a href="/frost">FROST</a>
            <a href="/apps">Apps</a>
            <a href="/requests">Requests</a>
            {{if .User.IsAdmin}}<a href="/users">Users</a>{{end}}
        </div>
        <div class="nav-user">
            <a href="/settings" class="nav-username">{{.User.Username}}</a>
            {{if .User.IsAdmin}}<span class="badge badge-admin">admin</span>{{end}}
            <a href="/logout" class="btn btn-sm">Logout</a>
        </div>
    </nav>
    {{end}}
    <main class="container">
        {{template "content" .}}
    </main>
    <script src="/static/app.js"></script>
</body>
</html>
{{end}}
